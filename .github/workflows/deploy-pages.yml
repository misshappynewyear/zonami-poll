name: Deploy GitHub Pages

on:
  push:
    branches: ["master", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js
        shell: bash
        run: |
          cat > config.js <<'EOF'
          window.VOTE_PAGE_CONFIG = {
            submissionEndpoint: "${{ vars.SUBMISSION_ENDPOINT }}"
          };
          EOF

      - name: Select phase entrypoint
        shell: bash
        run: |
          PHASE="${{ vars.APP_PHASE }}"
          if [ "$PHASE" = "suggestion" ]; then
            if [ -f "index-suggestion.html" ]; then
              cp index-suggestion.html index.html
            fi
            rm -f index-vote.html
          elif [ "$PHASE" = "vote" ]; then
            if [ -f "index-vote.html" ]; then
              cp index-vote.html index.html
            fi
            rm -f index-suggestion.html
          else
            echo "APP_PHASE not set, using current index.html"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
